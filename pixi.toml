[workspace]
channels = ["conda-forge"]
name = "sam3_pose"
platforms = ["win-64"]
version = "0.1.0"

[tasks]

[dependencies] 
python = "3.12.*"
pymomentum-gpu = ">=0.1.95,<0.2"
numpy = ">=2.3.5,<3"
scipy = ">=1.16.3,<2"
tk = ">=8.6.13,<9"
matplotlib = ">=3.10.8,<4"
pytorch-gpu = ">=2.9.1,<3"
scikit-learn = ">=1.8.0,<2"
opencv = ">=4.13.0,<5"
 
[system-requirements] 
cuda = "12.9" 

[pypi-dependencies]
python-osc = ">=1.9.3, <2"
smplx = ">=0.1.28, <0.2"
timm = ">=1.0.22, <2"
trimesh = ">=4.10.1, <5"
omegaconf = ">=2.3.0, <3"
hydra-core = ">=1.3.2, <2"
fvcore = ">=0.1.5.post20221221, <0.2"
iopath = ">=0.1.10, <0.2"
braceexpand = ">=0.1.7, <0.2"
roma = ">=1.5.4, <2"
einops = ">=0.8.1, <0.9"
yacs = ">=0.1.8, <0.2"
pytorch-lightning = ">=2.6.0, <3"
keyboard = "*"
